<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins';
background:#fff5f8;
margin:0;
}

header{
background:#ff4d94;
color:white;
padding:15px;
text-align:center;
font-family:'Pacifico';
font-size:30px;
}

.container{
display:flex;
}

/* LEFT SHOP */
.shop{
width:65%;
padding:15px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

/* CARD */
.product{
background:white;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:10px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.product h4{
margin:8px 0;
}

.product button{
background:#ff4d94;
color:white;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
}

/* RIGHT PANEL */
.panel{
width:35%;
padding:15px;
background:#ffe6f0;
}

input,select{
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#ff4d94;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

.order{
background:white;
margin:5px;
padding:10px;
border-radius:10px;
font-size:14px;
}
</style>
</head>

<body>

<header>🎂 Zoe's Cakes</header>

<div class="container">

<!-- SHOP -->
<div class="shop">

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Drip Cake</h4>
<button onclick="selectOrder('Drip Cake','Small')">Select</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Mini Tiered</h4>
<button onclick="selectOrder('Mini Tiered','Standard')">Select</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Tiered Cake</h4>
<button onclick="selectOrder('Tiered Cake','Standard')">Select</button>
</div>

</div>

<!-- PANEL -->
<div class="panel">

<h3>Order</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" type="number" placeholder="Enter Price">

<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save</button>

<h3>Orders</h3>
<div id="orders"></div>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AUTO DATE
function setToday(){
document.getElementById("date").value =
new Date().toISOString().split('T')[0];
}

// SELECT
function selectOrder(cake,size){
document.getElementById("cake").value=cake;
document.getElementById("size").value=size;
document.getElementById("price").value="";
document.getElementById("price").focus();
}

// SAVE
function saveOrder(){
let name=nameEl.value;
let cake=cakeEl.value;
let size=sizeEl.value;
let price=parseFloat(priceEl.value)||0;
let status=statusEl.value;
let date=dateEl.value;

if(!name||!cake){
alert("Complete order!");
return;
}

db.collection("orders").add({name,cake,size,price,status,date});
}

// LOAD
function loadOrders(){
db.collection("orders").onSnapshot((snap)=>{
let html="";
snap.forEach(doc=>{
let o=doc.data();
html+=`
<div class="order">
👤 ${o.name}<br>
🎂 ${o.cake}<br>
💸 ₱${o.price}<br>
📅 ${o.date}<br>
📌 ${o.status}
</div>`;
});
orders.innerHTML=html;
});
}

// SHORTCUT
let nameEl=name;
let cakeEl=cake;
let sizeEl=size;
let priceEl=price;
let statusEl=status;
let dateEl=date;
let orders=document.getElementById("orders");

setToday();
loadOrders();

</script>

</body>
</html>
