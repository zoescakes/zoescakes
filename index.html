<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#ffd6e7;margin:0}
h1{text-align:center;color:#ff4d94}
.main{display:flex}
.left{width:60%;padding:10px}
.right{width:40%;padding:10px}
.card{background:#fff0f5;padding:10px;margin:10px;border-radius:10px}
button{padding:8px;background:#ff4d94;color:white;border:none;border-radius:5px;margin:3px}
input,select{width:90%;padding:8px;margin:5px}
.order{background:#ffe6f0;margin:5px;padding:8px;border-radius:5px}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes PRO</h1>

<div class="main">

<div class="left">

<div class="card">
<h3>Drip Cake</h3>
<button onclick="selectOrder('Drip Cake','Small',380)">Small ₱380</button>
<button onclick="selectOrder('Drip Cake','Medium',580)">Medium ₱580</button>
<button onclick="selectOrder('Drip Cake','Large',700)">Large ₱700</button>
</div>

<div class="card">
<h3>Mini Tiered</h3>
<button onclick="selectOrder('Mini Tiered','Standard',2350)">₱2350</button>
</div>

<div class="card">
<h3>Tiered Cake</h3>
<button onclick="selectOrder('Tiered Cake','Standard',2800)">₱2800</button>
</div>

</div>

<div class="right">

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">

<!-- ✅ CALENDAR DATE -->
<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save Order</button>

<h3>Orders</h3>
<div id="orders"></div>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AUTO TODAY DATE
function setToday(){
let today = new Date().toISOString().split('T')[0];
document.getElementById("date").value = today;
}

// SELECT ORDER
function selectOrder(cake,size,price){
document.getElementById("cake").value = cake;
document.getElementById("size").value = size;
document.getElementById("price").value = price;
}

// SAVE ORDER
function saveOrder(){
let name = document.getElementById("name").value;
let cake = document.getElementById("cake").value;
let size = document.getElementById("size").value;
let price = document.getElementById("price").value;
let status = document.getElementById("status").value;
let date = document.getElementById("date").value;

if(name=="" || cake==""){
alert("Complete order first!");
return;
}

db.collection("orders").add({
name:name,
cake:cake,
size:size,
price:price,
status:status,
date:date
}).then(()=>{
alert("Saved Online!");
});
}

// LOAD ORDERS
function loadOrders(){
db.collection("orders").onSnapshot((snapshot)=>{
let html = "";
snapshot.forEach((doc)=>{
let o = doc.data();
html += "<div class='order'>"
+ "👤 "+o.name+"<br>"
+ "🎂 "+o.cake+"<br>"
+ "💸 ₱"+o.price+"<br>"
+ "📅 "+o.date+"<br>"
+ "📌 "+o.status
+ "</div>";
});
document.getElementById("orders").innerHTML = html;
});
}

// RUN
setToday();
loadOrders();

</script>

</body>
</html>
