<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes PRO+</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#ffe4f0;margin:0}
h1{text-align:center;color:#ff4d94}

.main{display:flex}
.left{width:60%;padding:10px}
.right{width:40%;padding:10px}

.card{
background:#fff0f5;
padding:15px;
margin:10px;
border-radius:15px
}

button{
padding:8px;
background:#ff4d94;
color:white;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer
}

input,select{
width:95%;
padding:10px;
margin:5px;
border-radius:10px
}

.order{
background:#fff;
margin:5px;
padding:10px;
border-radius:10px;
}

.icon{font-size:20px}
</style>
</head>

<body>

<h1>🎂 Zoe's Cakes PRO+</h1>

<div class="main">

<!-- LEFT MENU -->
<div class="left">

<div class="card">
<h3>🍰 Cakes</h3>

<button onclick="selectOrder('Drip Cake','Small')">🍫 Small</button>
<button onclick="selectOrder('Drip Cake','Medium')">🍓 Medium</button>
<button onclick="selectOrder('Drip Cake','Large')">🎂 Large</button>

<button onclick="selectOrder('Mini Tiered','Standard')">🧁 Mini Tiered</button>
<button onclick="selectOrder('Tiered Cake','Standard')">🎂 Tiered</button>

</div>

</div>

<!-- RIGHT SIDE -->
<div class="right">

<div class="card">
<h3>📝 Order</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">

<!-- editable price -->
<input id="price" type="number" placeholder="Enter Price">

<!-- calendar -->
<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save Order</button>

</div>

<div class="card">
<h3>📋 Orders</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>📊 Daily Sales</h3>
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AUTO DATE
function setToday(){
let today = new Date().toISOString().split('T')[0];
document.getElementById("date").value = today;
}

// SELECT
function selectOrder(cake,size){
document.getElementById("cake").value = cake;
document.getElementById("size").value = size;
document.getElementById("price").value = "";
document.getElementById("price").focus();
}

// SAVE
function saveOrder(){
let name=document.getElementById("name").value;
let cake=document.getElementById("cake").value;
let size=document.getElementById("size").value;
let price=parseFloat(document.getElementById("price").value)||0;
let status=document.getElementById("status").value;
let date=document.getElementById("date").value;

if(name==""||cake==""){
alert("Complete order!");
return;
}

db.collection("orders").add({
name,cake,size,price,status,date
});
}

// LOAD + CHART
function loadOrders(){

db.collection("orders").onSnapshot((snap)=>{

let html="";
let sales={};

snap.forEach(doc=>{
let o=doc.data();

html+=`
<div class="order">
👤 ${o.name}<br>
🎂 ${o.cake}<br>
💸 ₱${o.price}<br>
📅 ${o.date}<br>
📌 ${o.status}
</div>
`;

if(!sales[o.date]) sales[o.date]=0;
if(o.status=="Paid") sales[o.date]+=o.price;
});

document.getElementById("orders").innerHTML=html;

// CHART
let labels=Object.keys(sales);
let data=Object.values(sales);

new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Daily Sales',
data:data
}]
}
});

});

}

setToday();
loadOrders();

</script>

</body>
</html>
