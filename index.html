<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zoe's Cakes ULTRA</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{font-family:'Poppins';background:#fff5f8;margin:0}

header{
background:#ff4d94;
color:white;
padding:15px;
text-align:center;
font-family:'Pacifico';
font-size:30px;
}

.container{display:flex}

/* SHOP */
.shop{
width:65%;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.product{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
height:120px;
border-radius:10px;
object-fit:cover;
}

.product button{
margin-top:5px;
padding:8px;
background:#ff4d94;
color:white;
border:none;
border-radius:8px;
}

/* PANEL */
.panel{
width:35%;
background:#ffe6f0;
padding:15px;
}

input,select{
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
}

button{
background:#ff4d94;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.order{
background:white;
padding:10px;
margin:5px;
border-radius:10px;
font-size:14px;
}

.total{
background:#ff4d94;
color:white;
padding:10px;
border-radius:10px;
margin:10px 0;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<header>🎂 Zoe's Cakes</header>

<div class="container">

<!-- SHOP -->
<div class="shop">

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Drip Cake</h4>
<button onclick="selectOrder('Drip Cake','Small')">Select</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Mini Tiered</h4>
<button onclick="selectOrder('Mini Tiered','Standard')">Select</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/150">
<h4>Tiered Cake</h4>
<button onclick="selectOrder('Tiered Cake','Standard')">Select</button>
</div>

</div>

<!-- PANEL -->
<div class="panel">

<h3>Order</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" type="number" placeholder="Enter Price">
<input type="date" id="date">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<button onclick="saveOrder()">Save</button>

<div class="total" id="total">Total Sales: ₱0</div>

<h3>Orders</h3>
<div id="orders"></div>

</div>

</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
authDomain: "zoes-cake-order-tracker.firebaseapp.com",
projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// AUTO DATE
function setToday(){
document.getElementById("date").value =
new Date().toISOString().split('T')[0];
}

// SELECT
function selectOrder(cake,size){
cakeEl.value=cake;
sizeEl.value=size;
priceEl.value="";
priceEl.focus();
}

// SAVE
function saveOrder(){
let name=nameEl.value;
let cake=cakeEl.value;
let size=sizeEl.value;
let price=parseFloat(priceEl.value)||0;
let status=statusEl.value;
let date=dateEl.value;

if(!name||!cake){
alert("Complete order!");
return;
}

db.collection("orders").add({name,cake,size,price,status,date});
}

// DELETE
function deleteOrder(id){
db.collection("orders").doc(id).delete();
}

// UPDATE STATUS
function updateStatus(id,status){
db.collection("orders").doc(id).update({status});
}

// LOAD
function loadOrders(){
db.collection("orders").onSnapshot((snap)=>{

let html="";
let total=0;

snap.forEach(doc=>{
let o=doc.data();

if(o.status==="Paid") total+=o.price;

html+=`
<div class="order">
👤 ${o.name}<br>
🎂 ${o.cake}<br>
💸 ₱${o.price}<br>
📅 ${o.date}<br>

<select onchange="updateStatus('${doc.id}',this.value)">
<option ${o.status=="Pending"?"selected":""}>Pending</option>
<option ${o.status=="Paid"?"selected":""}>Paid</option>
<option ${o.status=="Claimed"?"selected":""}>Claimed</option>
</select>

<br>
<button onclick="deleteOrder('${doc.id}')">Delete</button>
</div>
`;
});

orders.innerHTML=html;
document.getElementById("total").innerText="Total Sales: ₱"+total;

});
}

// SHORTCUT
let nameEl=name;
let cakeEl=cake;
let sizeEl=size;
let priceEl=price;
let statusEl=status;
let dateEl=date;
let orders=document.getElementById("orders");

// RUN
setToday();
loadOrders();

</script>

</body>
</html>
