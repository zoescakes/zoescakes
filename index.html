<!DOCTYPE html>
<html>
<head>
<title>Zoe's Cakes</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
font-family:'Poppins';
background: linear-gradient(to right,#ffd6e7,#ffeaf4);
margin:0;
}

.logo {
text-align:center;
font-family:'Pacifico';
font-size:40px;
color:#ff4d94;
margin:10px;
}

.main { display:flex; height:95vh; }

.left { width:60%; padding:10px; overflow:auto; }
.right { width:40%; padding:10px; display:flex; flex-direction:column; gap:10px; }

.container {
background:white;
padding:15px;
border-radius:20px;
}

.cakes {
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card {
background:#fff0f5;
padding:10px;
border-radius:15px;
text-align:center;
}

.card img {
width:100%;
border-radius:10px;
}

.price {
background:#ff4d94;
color:white;
margin:5px;
padding:6px;
border-radius:8px;
cursor:pointer;
}

input, select {
width:95%;
padding:10px;
margin:5px;
border-radius:10px;
}

button {
padding:10px;
background:#ff4d94;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.order {
background:#ffe6f0;
padding:8px;
margin:5px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">🎂 Zoe's Cakes</div>

<div class="main">

<!-- MENU -->
<div class="left container">
<h3>Choose Cake 💖</h3>

<div class="cakes">

<div class="card">
<img src="drip.jpg">
<h4>Drip Cake</h4>
<div class="price" onclick="selectOrder('Drip Cake','Small',380)">Small - ₱380</div>
<div class="price" onclick="selectOrder('Drip Cake','Medium',580)">Medium - ₱580</div>
<div class="price" onclick="selectOrder('Drip Cake','Large',700)">Large - ₱700</div>
</div>

<div class="card">
<img src="mini.jpg">
<h4>Mini Tiered</h4>
<div class="price" onclick="selectOrder('Mini Tiered','Standard',2350)">₱2350</div>
</div>

<div class="card">
<img src="tiered.jpg">
<h4>Tiered Cake</h4>
<div class="price" onclick="selectOrder('Tiered Cake','Standard',2800)">₱2800</div>
</div>

<div class="card">
<img src="cupcake.jpg">
<h4>With Cupcakes</h4>
<div class="price" onclick="selectOrder('With Cupcakes','Standard',1350)">₱1350</div>
</div>

<div class="card">
<img src="wedding.jpg">
<h4>Wedding Cake</h4>
<div class="price" onclick="selectOrder('Wedding Cake','Starting',3500)">₱3500+</div>
</div>

</div>
</div>

<!-- ORDER -->
<div class="right">

<div class="container">
<h3>Order 💖</h3>

<input id="name" placeholder="Customer Name">
<input id="cake" placeholder="Cake">
<input id="size" placeholder="Size">
<input id="price" placeholder="Price">

<select id="status">
<option>Pending</option>
<option>Paid</option>
<option>Claimed</option>
</select>

<h4>GCash: 09062070504 cheryl ann c</h4>

<button onclick="saveOrder()">Save Order</button>
</div>

<div class="container">
<h3>ONLINE Orders 💸</h3>
<div id="orders"></div>
</div>

</div>
</div>

<script>

// ✅ YOUR FIREBASE CONFIG (NA BUTANG NA)
const firebaseConfig = {
  apiKey: "AIzaSyCGJ_LtyRkZ3YzfxVIsfu2uQKQvhDOHSLg",
  authDomain: "zoes-cake-order-tracker.firebaseapp.com",
  projectId: "zoes-cake-order-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function selectOrder(cake,size,price){
document.getElementById("cake").value=cake;
document.getElementById("size").value=size;
document.getElementById("price").value=price;
}

function saveOrder(){
let name=document.getElementById("name").value;
let cake=document.getElementById("cake").value;
let price=document.getElementById("price").value;
let status=document.getElementById("status").value;

if(name==""||cake==""){
alert("Complete order!");
return;
}

db.collection("orders").add({
name,cake,price,status
});

alert("Saved Online!");
}

function loadOrders(){
db.collection("orders").onSnapshot((snap)=>{
let html="";
snap.forEach(doc=>{
let o=doc.data();

html+=`
<div class="order">
${o.name} | ${o.cake} | ₱${o.price} | ${o.status}
</div>`;
});

document.getElementById("orders").innerHTML=html;
});
}

loadOrders();

</script>

</body>
</html>
